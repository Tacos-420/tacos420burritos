<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacos 420 | Burritos</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Barra -->

    <header>

        <div class="logo">

            <img src="img/logo.jpg" alt="Logo">

        </div>

        <nav>

            <ul>

                <li><a href="#inicio">Inicio</a></li>

                <li><a href="#menu">Menú</a></li>

                <li><a href="#sucursal">Sucursal</a></li>

                <li><a href="#redes">Redes Sociales</a></li>

            </ul>

        </nav>

    </header>

    <!-- HERO -->

    <section id="inicio" class="hero">

        <img src="img/hero.jpg" alt="Hero" class="hero-img">

        <div class="overlay"></div>

        <div class="hero-content">

            <img src="img/logo.jpg" class="hero-logo" alt="Logo">

        </div>

    </section>

    <!-- MENÚ -->

    <section id="menu" class="menu">

        <img src="img/menu.jpg" alt="Menú">

    </section>

    <!-- SUCURSAL -->

    <section id="sucursal" class="sucursal">

        <h2>Sucursal</h2>

        <p>
            1420 South Federal Boulevard<br>
            Denver, Colorado
        </p>

        <a href="https://maps.app.goo.gl/bYZ6wuXYKVyG8BPP7" target="_blank" class="boton">
            Ver ubicación
        </a>

    </section>

    <!-- REDES -->

    <section id="redes" class="redes">

        <h2>Redes Sociales</h2>

        <div class="redes-botones">

            <a href="#" class="social">Facebook</a>

            <a href="#" class="social">Instagram</a>

            <a href="#" class="social">TikTok</a>

        </div>

    </section>

    <footer>

        <img src="img/logo.jpg" alt="Logo">

    </footer>

    <script src="script.js"></script>

</body>

</html>
